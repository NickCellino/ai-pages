<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice to Text Demo (Transformers.js)</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container">
    <h1>Voice to Text Demo</h1>
    <p>
      Record your voice and transcribe it in-browser with
      <strong>Transformers.js</strong> (Whisper).
    </p>

    <div class="card controls">
      <label class="field">
        Model
        <select id="modelSelect">
          <option value="distil-whisper/distil-large-v3.5">Best accuracy (English, slower)</option>
          <option value="distil-whisper/distil-large-v3">High accuracy (English)</option>
          <option value="Xenova/whisper-small.en">Balanced speed/accuracy</option>
          <option value="Xenova/whisper-tiny.en">Fastest (lower accuracy)</option>
        </select>
      </label>
      <button id="loadModelBtn" type="button">Load model</button>
      <button id="startBtn" type="button" disabled>Start recording</button>
      <button id="stopBtn" type="button" disabled>Stop + transcribe</button>
    </div>

    <div class="card">
      <h2>Status</h2>
      <p id="status">Model not loaded.</p>
    </div>

    <div class="card">
      <h2>Transcript</h2>
      <textarea id="transcript" rows="8" placeholder="Your transcript will appear here..." readonly></textarea>
    </div>

    <p class="note">
      Tip: Microphone access usually requires HTTPS or <code>localhost</code>.
      Larger models are more accurate, but the first load can take a while.
    </p>

    <p><a href="../../index.html">← Back to project list</a></p>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
